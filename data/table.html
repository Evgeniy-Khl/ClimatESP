<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="data:,">
	<!--link rel="icon" href="image/calendar.ico" type="image/ico"-->
    <title>Редагування програми</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
            font-size: 16px; /* Увеличен размер шрифта для удобства чтения на мобильных устройствах */
        }
        /* Заменяем существующий стиль th на этот */
		th {
			position: sticky;
			top: 0;
			background-color: #f4f4f4;
			z-index: 2; /* Ставим выше, чем у столбца */
		}

		/* Добавляем этот новый стиль для первого столбца */
		td:first-child {
			position: sticky;
			left: 0;
			background-color: #f9f9f9; /* Цвет фона как у body */
			z-index: 1; /* Ставим ниже, чем у заголовка */
		}

		/* Стиль для левой верхней ячейки, чтобы она была поверх всего */
		th:first-child {
			left: 0;
			z-index: 3;
		}
		
        button {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<h1>Таблиця інкубації</h1>
<table id="dataTable">
    <thead>
        <tr>
            <th>Доба</th> 
            <th>Температура №1 (°C)</th>
            <th>Температура №2 (°C)</th>
            <th>Вологість (%)</th>
            <th>Заслінка (%)</th>
            <th>Поворот (хвл.)</th>
            <th>Поворот (сек.)</th>
            <th>Пауза (хвл.)</th>
            <th>Провітрювання (сек.)</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
<button id="saveButton">ЗБЕРІГТИ</button>
<p><a href="/"><button id="canselButton">СКАСУВАТИ</button></a></p>
<script>
async function fetchData() {
    const maxAttempts = 5; // Максимальное количество попыток
    let attempts = 0; // Счётчик попыток
    const loadingPopup = document.getElementById('loadingPopup'); // Элемент всплывающего окна

    loadingPopup.style.display = 'block'; // Показываем всплывающее окно

    while (attempts < maxAttempts) {
        try {
            const response = await fetch('/get_table', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
            });

            if (!response.ok) {
                throw new Error('Ошибка загрузки данных');
            }

            const data = await response.json();
            const tbody = document.getElementById('dataTable').getElementsByTagName('tbody')[0];
            tbody.innerHTML = ''; // Очистка таблицы

            data.forEach((row, index) => {
                const tr = document.createElement('tr');
                const dayCell = document.createElement('td');
                dayCell.innerHTML = `Д.${index + 1}`; // Нумерация строк
                tr.appendChild(dayCell);

                row.forEach((cell, cellIndex) => {
                    const td = document.createElement('td');
                    if (cellIndex === 0 || cellIndex === 1 || cellIndex === 2) {
                        td.innerHTML = (cell / 10).toFixed(1); // Дробное значение
                    } else {
                        td.innerHTML = cell;
                    }
                    td.contentEditable = true; // Позволяем редактировать
                    tr.appendChild(td);
					
					// Добавляем обработчики событий для режима замены
					td.addEventListener('focus', () => {
						td.dataset.originalValue = td.innerHTML; // Сохраняем оригинал
					});

					td.addEventListener('input', () => {
						td.style.backgroundColor = 'lightyellow'; // Подсветка
					});

					td.addEventListener('blur', () => {
						const newValue = td.innerHTML.trim();
						let minValue, maxValue;

						// Устанавливаем пределы для каждой колонки
						if (cellIndex === 0) { // Температура №1 (°C)
							minValue = 20; // Минимум для Температуры №1
							maxValue = 40;  // Максимум для Температуры №1
						} else if (cellIndex === 1) { // Температура №2 (°C)
							minValue = 20; // Минимум для Температуры №2
							maxValue = 40;  // Максимум для Температуры №2
						} else if (cellIndex === 2) { // Влажность (%)
							minValue = 20;   // Минимум для Влажности
							maxValue = 90; // Максимум для Влажности
						} else if (cellIndex === 3) { // Заслонка (%)
							minValue = 0;   // Минимум для Заслонки
							maxValue = 100; // Максимум для Заслонки
						}

						// Проверка на пустую строку
						if (newValue === '') {
							td.innerHTML = td.dataset.originalValue; // Восстанавливаем оригинал
						} else {
							const numericValue = parseFloat(newValue);
							if (isNaN(numericValue)) {
								td.innerHTML = td.dataset.originalValue; // Восстанавливаем если не число
							} else if (numericValue < minValue || numericValue > maxValue) {
								alert(`Значение должно быть между ${minValue} и ${maxValue}.`);
								td.innerHTML = td.dataset.originalValue; // Восстанавливаем оригинал
							} else {
								td.innerHTML = numericValue; // Присваиваем новое значение, если оно в пределах допустимого
							}
						}
						td.style.backgroundColor = ''; // Сброс стиля
				    });
				});
				tbody.appendChild(tr);
            });
            break; // Если загрузка прошла успешно, выходим из цикла
        } catch (error) {
            attempts++;
            console.error(`Попытка ${attempts}: ${error.message}`);
            if (attempts === maxAttempts) {
                alert('Не удалось загрузить данные после 5 попыток.');
                loadingPopup.style.display = 'none'; // Скрываем всплывающее окно
                return; // Завершаем выполнение
            }
            // Задержка перед следующей попыткой (например, 1 секунда)
            await new Promise(resolve => setTimeout(resolve, 1000));
        }
    }

    loadingPopup.style.display = 'none'; // Скрываем всплывающее окно после завершения загрузки
}

async function saveData() {
	const tbody = document.getElementById('dataTable').getElementsByTagName('tbody')[0];
	const rows = Array.from(tbody.getElementsByTagName('tr'));

	const dataToSend = rows.map(row => {
		return Array.from(row.getElementsByTagName('td')).map((cell, index) => {
			// Заменяем запятую на точку для корректного преобразования
			const formattedValue = cell.innerHTML.replace(',', '.');

			// Преобразуем значение в число
			const value = (index === 1 || index === 2 || index === 3) ? Math.round(parseFloat(formattedValue) * 10) : parseInt(formattedValue);
			return isNaN(value) ? null : value;
		}).filter(cell => cell !== null);
	}).filter(row => row.length > 0);

	// Оборачиваем данные в объект с ключом "data"
	const payload = { data: dataToSend };

	// Сериализация в JSON и кодирование для URL
	const jsonData = encodeURIComponent(JSON.stringify(payload));
	console.log("Отправляемые данные:", jsonData); // Логирование данных

	const response = await fetch(`/save_table?data=${jsonData}`, {
		method: 'GET'
	});

	if (response.ok) {
		alert('Настройки успешно сохранены!');
	} else {
		alert('Ошибка при сохранении настроек.');
	}
		
	// Переход на / после сохранения данных
	window.location.href = '/';
}

document.getElementById('saveButton').addEventListener('click', saveData);
window.onload = fetchData; // Загружаем данные при загрузке страницы
</script>
<!-- Всплывающее окно -->
	<div id="loadingPopup" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background-color:white; border:1px solid gray; padding:20px; z-index:1000;">
		Загрузка данных, пожалуйста подождите...
	</div>
</body>
</html>
