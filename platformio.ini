; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Указываем среды сборки по умолчанию. 
; Если запустить сборку без указания конкретной среды, соберутся обе.
default_envs = led

[env]
platform = espressif8266
board = esp12e
framework = arduino
upload_port = COM3
board_build.filesystem = littlefs

; build_flags = -DLANGUAGE_EN  ; Английский (раскомментировать для выбора)
; build_flags = -DLANGUAGE_RU   ; Русский (раскомментировать для выбора)

lib_deps =
    adafruit/RTClib @ ^2.1.1 
    ESP Async WebServer@^1.2.3   
    bblanchon/ArduinoJson @ ^7.3.0
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    https://github.com/tzapu/WiFiManager.git
    https://github.com/Links2004/arduinoWebSockets

[env:led]
build_src_filter =
    +<*>                ; Включить все файлы из src по умолчанию
    -<display_tft.cpp>  ; Исключить файл для TFT

[env:tft]
build_src_filter =
    +<*>                ; Включить все файлы из src по умолчанию
    -<display_led.cpp>  ; Исключить файл для TFT
    -<keypad.cpp>       ; Исключить файл для TFT
lib_deps =
    bodmer/TFT_eSPI@^2.5.43

