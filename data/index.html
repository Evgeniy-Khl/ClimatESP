<script>
function fetchData() {
    // Запрос данных о температуре и влажности
    var xhttp = new XMLHttpRequest();
    
    xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
            var jsonResponse = JSON.parse(this.responseText);
            console.log("Отримані дані:", jsonResponse);
            
			document.getElementById("model").innerHTML = jsonResponse.model;
            document.getElementById("temperature0").innerHTML = jsonResponse.temperature0;
            document.getElementById("settemp0").innerHTML = jsonResponse.settemp0;
			
			// Преобразование строковых значений в числа
            const error1 = jsonResponse.error1;
            const error2 = jsonResponse.error2;
            const error4 = jsonResponse.error4;
            const error8 = jsonResponse.error8;
            const overheat = jsonResponse.overheat;
			
			// Изменение цвета блока #rcorners0
            if (error1 == 1) {
                document.getElementById("rcorners0").style.background = "#fc5d70";
            } else {
                document.getElementById("rcorners0").style.background = "#89f594";
            }
			if (error4 == 1) {
                document.getElementById("rcorners0").style.background = "#fcfa5d";
            } else {
                document.getElementById("rcorners0").style.background = "#89f594";
            }
			
			// Проверка наличия temperature1
            if (jsonResponse.temperature1 === undefined) {
                document.getElementById("rcorners1").style.display = 'none';
            } else {
                document.getElementById("temperature1").innerHTML = jsonResponse.temperature1;
                document.getElementById("settemp1").innerHTML = jsonResponse.settemp1;
				// Изменение цвета блока #rcorners1
				if (error2 == 1) {
					document.getElementById("rcorners1").style.background = "#fc5d70";
				} else {
					document.getElementById("rcorners1").style.background = "#89f594";
				}
				if (error8 == 1) {
					document.getElementById("rcorners1").style.background = "#fcfa5d";
				} else {
					document.getElementById("rcorners1").style.background = "#89f594";
				}
            }
			
            document.getElementById("humidity").innerHTML = jsonResponse.humidity;
            document.getElementById("sethum").innerHTML = jsonResponse.sethum;
			
			document.getElementById("ventmode").innerHTML = jsonResponse.ventmode;
			document.getElementById("extmode").innerHTML = jsonResponse.extmode;
			document.getElementById("relaymode").innerHTML = jsonResponse.relaymode;
			document.getElementById("checkDry").innerHTML = jsonResponse.checkDry;
            document.getElementById("rotation").innerHTML = jsonResponse.rotation;
            document.getElementById("power").innerHTML = jsonResponse.power;
            document.getElementById("flap").innerHTML = jsonResponse.flap;
			document.getElementById("program").innerHTML = jsonResponse.program;
            document.getElementById("currDay").innerHTML = jsonResponse.currDay;

            // Обновление цвета LED
            document.getElementById('led0').style.backgroundColor = jsonResponse.led0 === "ON" ? "#00ff00" : "#595959";
			document.getElementById('led0').style.display = jsonResponse.led0 === "ON" ? "table-cell" : "none";
            document.getElementById('led1').style.backgroundColor = jsonResponse.led1 === "ON" ? "#fc9d03" : "#595959";
			document.getElementById('led1').style.display = jsonResponse.led1 === "ON" ? "table-cell" : "none";
            document.getElementById('led2').style.backgroundColor = jsonResponse.led2 === "ON" ? "#00aaff" : "#595959";
			document.getElementById('led2').style.display = jsonResponse.led2 === "ON" ? "table-cell" : "none";
            document.getElementById('led3').style.backgroundColor = jsonResponse.led3 === "ON" ? "#00ff00" : "#595959";
			document.getElementById('led3').style.display = jsonResponse.led3 === "ON" ? "table-cell" : "none";
            document.getElementById('led4').style.backgroundColor = jsonResponse.led4 === "ON" ? "#b33d02" : "#595959";
			document.getElementById('led4').style.display = jsonResponse.led4 === "ON" ? "table-cell" : "none";
            document.getElementById('led5').style.backgroundColor = jsonResponse.led5 === "ON" ? "#ff0000" : "#595959";
			document.getElementById('led5').style.display = jsonResponse.led5 === "ON" ? "table-cell" : "none";
			
		    // Управление кнопкой "Програма"
            const programButton = document.getElementById("programButton");
            if (jsonResponse.program == "немає") {
                programButton.disabled = true; // Деактивировать кнопку
                programButton.innerText = "Програми немає"; // Изменить текст (по желанию)
            } else {
                programButton.disabled = false; // Активировать кнопку
                programButton.innerText = "Програма"; // Вернуть текст
            }
        }
    };

    console.log("Надсилаємо запит на отримання даних");
    xhttp.open("GET", "/getvalues", true);
    xhttp.send();
}

let mainChart;

function fetchGraphData() {
    fetch('/get_current_graph')
      .then(r => r.json())
      .then(data => {
        const labels = data.map(p => {
            let total = p.p * 5;
            let h = Math.floor(total / 60);
            let m = total % 60;
            return h.toString().padStart(2, '0') + ':' + m.toString().padStart(2, '0');
        });
        const t1 = data.map(p => p.t1);
        const t2 = data.map(p => p.t2);

        if (mainChart) {
            mainChart.data.labels = labels;
            mainChart.data.datasets[0].data = t1;
            mainChart.data.datasets[1].data = t2;
            mainChart.update('none'); // Обновляем без анимации для плавности
        } else {
            const ctx = document.getElementById('mainChart').getContext('2d');
            mainChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'T1 (Повітря)', data: t1, borderColor: '#ff4d4d', backgroundColor: '#ff4d4d', tension: 0.3, pointRadius: 1 },
                        { label: 'T2 (Яйце)', data: t2, borderColor: '#3399ff', backgroundColor: '#3399ff', tension: 0.3, pointRadius: 1 }
                    ]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { beginAtZero: false } },
                    interaction: { intersect: false, mode: 'index' },
                    plugins: { legend: { display: true, labels: { boxWidth: 10 } } }
                }
            });
        }
      })
      .catch(err => console.error("Ошибка загрузки графика:", err));
}

// Первичное заполнение данных при загрузке страницы
window.onload = function() {
    fetchData(); // Первоначальный запрос цифр
    fetchGraphData(); // Первоначальная отрисовка графика
    setInterval(fetchData, 2000); // Обновление цифр каждые 2 сек
    setInterval(fetchGraphData, 60000); // Обновление графика каждую минуту
};
</script>
